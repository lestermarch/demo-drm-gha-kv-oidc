name: "Key Vault Secrets Demo"

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  show-secrets:
    runs-on: ubuntu-latest
    environment: demo
    steps:
      - name: 'Show Secrets'
        run: |
          echo "Repo secret (masked): ${{ secrets.DEMO_REPO_SECRET }}"
          echo "Envronment secret (masked): ${{ secrets.DEMO_ENV_SECRET }}"
          echo "---"
          echo "Note: All values above are masked with '***' in the logs"
  
  get-kv-secrets:
    runs-on: ubuntu-latest
    environment: demo
    steps:
      - name: 'Checkout Repo'
        uses: actions/checkout@v4
      
      - name: 'Azure Login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: 'Get Key Vault Secret (Option 1)'
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ vars.KEY_VAULT_NAME }}
          secrets: "demo-secret-1, demo-secret-2"
        id: kv-secrets

      - name: 'Use Key Vault Secrets (Option 1)'
        run: |
          echo "demo-secret-1 is set: ${{ steps.kv-secrets.outputs.demo-secret-1 != ''}}"
          echo "demo-secret-2 is set: ${{ steps.kv-secrets.outputs.demo-secret-2 != ''}}"


      - name: 'Get Key Vault Secret (Option 2)'
        run: |
          SECRET=$(az keyvault secret show --vault-name ${{ vars.KEY_VAULT_NAME }} --name "demo-secret-1" --query value -o tsv)
          echo "::add-mask::$SECRET"
          echo "DEMO_SECRET_1=$SECRET" >> $GITHUB_ENV

      - name: 'Use Key Vault Secret (Option 2)'
        run: |
          echo "Secret length: ${#DEMO_SECRET_1} characters"
          echo "Value (masked): $DEMO_SECRET_1"
